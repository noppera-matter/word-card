<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="단어카드">
    <meta name="theme-color" content="#6366f1">
    <title>🗂️ 단어 카드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.25);
            --accent: #f59e0b;
            --heart: #ef4444;
            --heart-glow: rgba(239, 68, 68, 0.3);
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-inner: #334155;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #f1f5f9;
            --text-sub: #94a3b8;
            --text-dim: #64748b;
            --success: #22c55e;
            --radius: 28px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── 앱 프레임 ─── */
        .app {
            width: 100%;
            max-width: 440px;
            height: 100%;
            max-height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
        }

        /* ─── 스크린 전환 ─── */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════
           스크린 1: 업로드
           ═══════════════════════════════════ */
        .upload-screen {
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            text-align: center;
        }

        .upload-logo {
            font-size: 5rem;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.05); }
        }

        .upload-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .upload-subtitle {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .dropzone {
            width: 100%;
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: var(--radius);
            padding: 50px 30px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            transform: scale(1.02);
            box-shadow: 0 0 40px var(--primary-glow);
        }

        .dropzone-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 14px;
        }

        .dropzone h3 {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .dropzone p {
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .file-input {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .upload-guide {
            margin-top: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            width: 100%;
        }

        .upload-guide h4 {
            color: var(--primary);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .upload-guide p {
            color: var(--text-sub);
            font-size: 0.8rem;
            line-height: 1.8;
        }

        .upload-guide code {
            background: rgba(99, 102, 241, 0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.78rem;
            color: var(--primary);
        }

        /* ═══════════════════════════════════
           스크린 2: 카드 뷰
           ═══════════════════════════════════ */
        .card-screen {
            padding: 0;
        }

        /* ── 상단 바 ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(env(safe-area-inset-top, 0px) + 36px) 20px 10px;
            flex-shrink: 0;
        }

        .btn-back {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .btn-back:active {
            transform: scale(0.92);
        }

        .top-bar-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-sub);
        }

        .btn-list {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .btn-list:active {
            transform: scale(0.92);
        }

        /* ── 진행률 ── */
        .progress-section {
            padding: 0 24px 10px;
            flex-shrink: 0;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-counter {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .progress-counter strong {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .progress-hearts {
            font-size: 0.85rem;
            color: var(--heart);
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #a78bfa);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* ── 카드 영역 ── */
        .card-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            perspective: 1200px;
            overflow: hidden;
            position: relative;
        }

        .card-3d {
            width: 100%;
            max-width: 380px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card-3d.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }

        /* 카드 앞면 */
        .card-front-face {
            background: linear-gradient(145deg, #1e293b, #2a3550);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .card-front-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .card-front-word {
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1.3;
            word-break: keep-all;
            background: linear-gradient(135deg, #fff, #c7d2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-front-hint {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-front-hint .tap-icon {
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 카드 뒷면 */
        .card-back-face {
            background: linear-gradient(145deg, #312e81, #3b0764);
            border: 1px solid rgba(167, 139, 250, 0.15);
            box-shadow: 0 20px 60px rgba(49, 46, 129, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transform: rotateY(180deg);
        }

        .card-back-label {
            font-size: 0.8rem;
            color: rgba(196, 181, 253, 0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }

        .card-back-meaning {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.6;
            color: #e9e5ff;
            word-break: keep-all;
            max-height: 180px;
            overflow-y: auto;
        }

        .card-back-divider {
            width: 50px;
            height: 2px;
            background: rgba(167, 139, 250, 0.3);
            border-radius: 2px;
            margin: 20px 0;
        }

        .card-front-keyword {
            font-size: 1.4rem;
            font-weight: 800;
            color: #facc15;
            margin-top: 16px;
        }

        .card-front-errors {
            position: absolute;
            bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
            font-size: 0.9rem;
            color: rgba(196, 181, 253, 0.7);
        }

        .error-stars {
            color: var(--accent);
            letter-spacing: 2px;
        }

        .perfect-badge {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* ── 카드 슬라이드 애니메이션 ── */
        .card-3d.slide-left {
            animation: slideLeft 0.35s ease forwards;
        }

        .card-3d.slide-right {
            animation: slideRight 0.35s ease forwards;
        }

        .card-3d.slide-in-left {
            animation: slideInLeft 0.35s ease forwards;
        }

        .card-3d.slide-in-right {
            animation: slideInRight 0.35s ease forwards;
        }

        @keyframes slideLeft {
            to { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
        }

        @keyframes slideRight {
            to { transform: translateX(120%) rotate(8deg); opacity: 0; }
        }

        @keyframes slideInLeft {
            from { transform: translateX(120%) rotate(8deg); opacity: 0; }
            to { transform: translateX(0) rotate(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(-120%) rotate(-8deg); opacity: 0; }
            to { transform: translateX(0) rotate(0); opacity: 1; }
        }

        /* ── 하단 컨트롤 ── */
        .bottom-controls {
            padding: 10px 24px 30px;
            flex-shrink: 0;
        }

        /* 하트 버튼 */
        .heart-section {
            display: flex;
            justify-content: center;
            margin-bottom: 18px;
        }

        .btn-heart {
            background: var(--glass);
            border: 2px solid var(--glass-border);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.6rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-heart:active {
            transform: scale(0.85);
        }

        .btn-heart.liked {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--heart);
            box-shadow: 0 0 30px var(--heart-glow);
            animation: heartPop 0.4s ease;
        }

        @keyframes heartPop {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* 네비게이션 버튼 */
        .nav-row {
            display: flex;
            gap: 12px;
        }

        .btn-nav {
            flex: 1;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-nav:active {
            transform: scale(0.96);
        }

        .btn-prev {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
        }

        .btn-prev:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: default;
        }

        /* ═══════════════════════════════════
           스크린 3: 리스트 뷰
           ═══════════════════════════════════ */
        .list-screen {
            padding: 0;
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(env(safe-area-inset-top, 0px) + 36px) 20px 14px;
            flex-shrink: 0;
        }

        .list-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .list-filter-row {
            display: flex;
            gap: 8px;
            padding: 0 20px 14px;
            flex-shrink: 0;
        }

        .filter-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-sub);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .list-body {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 30px;
        }

        .list-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }

        .list-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.08);
        }

        .list-item-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .list-item-num {
            width: 32px;
            height: 32px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            flex-shrink: 0;
        }

        .list-item-word {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .list-item-meaning {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 2px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-item-heart {
            font-size: 1.2rem;
            opacity: 0.3;
        }

        .list-item-heart.liked {
            opacity: 1;
        }

        /* ── 완료 화면 ── */
        .complete-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            z-index: 100;
            animation: fadeIn 0.5s ease;
        }

        .complete-overlay.active {
            display: flex;
        }

        .complete-emoji {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 2s ease-in-out infinite;
        }

        .complete-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #22c55e, #a3e635);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .complete-subtitle {
            color: var(--text-sub);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .complete-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .complete-stat {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            text-align: center;
        }

        .complete-stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
        }

        .complete-stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .btn-complete {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-complete:active {
            transform: scale(0.96);
        }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>

<body>
    <div class="app" id="app">
        <!-- ═══ 스크린 1: 업로드 ═══ -->
        <div class="screen upload-screen active" id="uploadScreen">
            <div class="upload-logo">📚</div>
            <h1 class="upload-title">단어 카드</h1>
            <p class="upload-subtitle">나만의 엑셀 파일로<br>단어 카드를 만들어 보세요</p>

            <label class="dropzone" id="dropzone" for="fileInput">
                <span class="dropzone-icon">📂</span>
                <h3>엑셀 파일을 드래그 & 드롭</h3>
                <p>또는 탭하여 파일 선택</p>
                <input type="file" class="file-input" id="fileInput" accept=".xlsx, .xls">
            </label>

            <div class="upload-guide">
                <h4>📋 엑셀 형식 안내</h4>
                <p>
                    <code>A열</code> 핵심단어 &nbsp;|&nbsp;
                    <code>B열</code> 오답여부 &nbsp;|&nbsp;
                    <code>C열</code> 키워드 &nbsp;|&nbsp;<br>
                    <code>D열</code> 설명
                </p>
            </div>
        </div>

        <!-- ═══ 스크린 2: 카드 뷰 ═══ -->
        <div class="screen card-screen" id="cardScreen">
            <div class="top-bar">
                <button class="btn-back" id="btnHome" style="font-size: 1.4rem;">🏠</button>
                <span class="top-bar-title" id="topBarTitle">단어 카드</span>
                <button class="btn-list" id="btnListView">☰</button>
            </div>

            <div class="progress-section">
                <div class="progress-info">
                    <span class="progress-counter"><strong id="currentNum">1</strong> / <span id="totalNum">0</span></span>
                    <span class="progress-hearts" id="heartCount">❤️ 0</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="card-area" id="cardArea">
                <div class="card-3d" id="card3d">
                    <div class="card-face card-front-face">
                        <div class="card-front-label">핵심단어</div>
                        <div class="card-front-word" id="cardWord">-</div>
                        <div class="card-front-keyword" id="cardKeyword">-</div>
                        <div class="card-front-hint">
                            <span class="tap-icon">👆</span> 탭하여 설명 확인
                        </div>
                        <div class="card-front-errors" id="cardErrors">-</div>
                    </div>
                    <div class="card-face card-back-face">
                        <div class="card-back-label">설명</div>
                        <div class="card-back-meaning" id="cardMeaning">-</div>
                    </div>
                </div>
            </div>

            <div class="bottom-controls">
                <div class="heart-section">
                    <button class="btn-heart" id="btnHeart">🤍</button>
                </div>
                <div class="nav-row">
                    <button class="btn-nav btn-prev" id="btnPrev">← 이전</button>
                    <button class="btn-nav btn-next" id="btnNext">다음 →</button>
                </div>
            </div>

            <!-- 완료 오버레이 -->
            <div class="complete-overlay" id="completeOverlay">
                <div class="complete-emoji">🎉</div>
                <div class="complete-title">모두 완료!</div>
                <p class="complete-subtitle">모든 단어 카드를 확인했어요.<br>대단해요!</p>
                <div class="complete-stats">
                    <div class="complete-stat">
                        <div class="complete-stat-value" id="completeTotal">0</div>
                        <div class="complete-stat-label">전체 단어</div>
                    </div>
                    <div class="complete-stat">
                        <div class="complete-stat-value" id="completeHearted">0</div>
                        <div class="complete-stat-label">❤️ 중요 표시</div>
                    </div>
                </div>
                <button class="btn-complete" id="btnRestart">처음부터 다시 보기</button>
            </div>
        </div>

        <!-- ═══ 스크린 3: 리스트 뷰 ═══ -->
        <div class="screen list-screen" id="listScreen">
            <div class="list-header">
                <div style="display: flex; gap: 8px;">
                    <button class="btn-back" id="btnListBack">←</button>
                    <button class="btn-back" id="btnListHome" style="font-size: 1.4rem;" title="처음 화면으로">🏠</button>
                </div>
                <h2>전체 단어 목록</h2>
                <div style="width:92px"></div>
            </div>
            <div class="list-filter-row">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="hearted">❤️ 중요</button>
                <button class="filter-btn" data-filter="weak">⚠️ 취약</button>
            </div>
            <div class="list-body" id="listBody"></div>
        </div>
    </div>

    <script>
        // ─── 상태 관리 ───
        const STORAGE_KEY = 'wordcard_words';
        const STORAGE_INDEX_KEY = 'wordcard_currentIndex';
        const STORAGE_HEARTS_KEY = 'wordcard_hearts';
        const STORAGE_SAVE_TIME_KEY = 'wordcard_savedAt';

        let words = [];        // [{ word, errors, meaning }]
        let hearts = {};       // { index: true }
        let currentIndex = 0;
        let isFlipped = false;

        // ─── DOM 요소 ───
        const uploadScreen = document.getElementById('uploadScreen');
        const cardScreen = document.getElementById('cardScreen');
        const listScreen = document.getElementById('listScreen');
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        const card3d = document.getElementById('card3d');
        const cardWord = document.getElementById('cardWord');
        const cardMeaning = document.getElementById('cardMeaning');
        const cardErrors = document.getElementById('cardErrors');
        const btnHeart = document.getElementById('btnHeart');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const currentNum = document.getElementById('currentNum');
        const totalNum = document.getElementById('totalNum');
        const heartCount = document.getElementById('heartCount');
        const progressFill = document.getElementById('progressFill');
        const completeOverlay = document.getElementById('completeOverlay');

        // ─── 화면 전환 ───
        function showScreen(screen) {
            [uploadScreen, cardScreen, listScreen].forEach(s => s.classList.remove('active'));
            screen.classList.add('active');
        }

        function requestPersistentStorage() {
            if (navigator.storage && navigator.storage.persist) {
                navigator.storage.persist().then(granted => {
                    console.log('Persistent storage granted:', granted);
                }).catch(err => {
                    console.warn('Persistent storage 요청 실패:', err);
                });
            }
        }

        window.addEventListener('beforeunload', () => {
            saveWords();
            saveCurrentIndex();
            saveHearts();
        });

        // ─── 파일 업로드 ───
        fileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        dropzone.addEventListener('dragover', e => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
        });

        function processFile(file) {
            var reader = new FileReader();
            reader.onerror = function() {
                alert('파일을 읽는 중 오류가 발생했습니다.');
            };
            reader.onload = function(e) {
                try {
                    var data = new Uint8Array(e.target.result);
                    var wb = XLSX.read(data, { type: 'array' });
                    var sheet = wb.Sheets[wb.SheetNames[0]];
                    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    // 헤더 행 감지 (B열이 숫자가 아니면 헤더)
                    if (rows.length > 0 && typeof rows[0][1] === 'string' && isNaN(Number(rows[0][1]))) {
                        rows = rows.slice(1);
                    }

                    // 빈 행 제거
                    rows = rows.filter(function(r) { return r && r.length >= 1 && r[0] !== undefined && r[0] !== ''; });

                    words = rows.map(function(r) {
                        return {
                            word: String(r[0] || ''),
                            errors: parseInt(r[1]) || 0,
                            keyword: String(r[2] || ''),
                            meaning: String(r[3] || '')
                        };
                    });

                    // localStorage에 단어 데이터 저장
                    saveWords();
                    requestPersistentStorage();

                    // localStorage에서 하트 복원
                    loadHearts();

                    currentIndex = 0;
                    saveCurrentIndex();
                    isFlipped = false;
                    renderCard();
                    showScreen(cardScreen);
                    fileInput.value = '';
                } catch (err) {
                    alert('파일 처리 중 오류: ' + err.message);
                    console.error(err);
                    fileInput.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ─── 단어 데이터 저장/복원 ───
        function saveWords() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
                localStorage.setItem(STORAGE_SAVE_TIME_KEY, new Date().toISOString());
            } catch (e) {
                console.warn('저장 용량 초과: ', e);
                alert('파일 용량이 커서 브라우저 캐시에 저장할 수 없습니다. (현재 화면에서만 카드가 표시되며, 새로고침 시 다시 업로드해야 합니다.)');
            }
        }

        function loadSavedWords() {
            try {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    words = JSON.parse(saved);
                    return words.length > 0;
                }
            } catch (e) { console.warn('loadSavedWords 오류', e); }
            return false;
        }

        function clearSavedWords() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(STORAGE_INDEX_KEY);
            localStorage.removeItem(STORAGE_HEARTS_KEY);
            localStorage.removeItem(STORAGE_SAVE_TIME_KEY);
        }

        function saveCurrentIndex() {
            localStorage.setItem(STORAGE_INDEX_KEY, currentIndex);
        }

        function loadCurrentIndex() {
            try {
                var saved = localStorage.getItem(STORAGE_INDEX_KEY);
                return saved ? parseInt(saved) || 0 : 0;
            } catch (e) { return 0; }
        }

        // ─── 하트 저장/복원 ───
        function saveHearts() {
            localStorage.setItem(STORAGE_HEARTS_KEY, JSON.stringify(hearts));
        }

        function loadHearts() {
            try {
                var saved = localStorage.getItem(STORAGE_HEARTS_KEY);
                hearts = saved ? JSON.parse(saved) : {};
            } catch (e) { hearts = {}; }
        }

        // ─── 카드 렌더링 ───
        function renderCard() {
            if (words.length === 0) return;

            const w = words[currentIndex];
            cardWord.textContent = w.word;
            document.getElementById('cardKeyword').textContent = w.keyword;
            cardMeaning.textContent = w.meaning;

            // 틀린 횟수
            if (w.errors === 0) {
                cardErrors.innerHTML = '<span class="perfect-badge">정답률 100% ✨</span>';
            } else {
                const stars = '★'.repeat(Math.min(w.errors, 10));
                cardErrors.innerHTML = `<span>틀린 횟수</span> <span class="error-stars">${stars}</span>${w.errors > 10 ? ` (${w.errors}회)` : ''}`;
            }

            // 하트 상태
            updateHeartUI();

            // 진행률
            currentNum.textContent = currentIndex + 1;
            totalNum.textContent = words.length;
            progressFill.style.width = `${((currentIndex + 1) / words.length) * 100}%`;

            // 하트 카운트
            const hc = Object.keys(hearts).filter(k => hearts[k]).length;
            heartCount.textContent = `❤️ ${hc}`;

            // 버튼 상태
            btnPrev.disabled = currentIndex === 0;

            // 카드 앞면으로 리셋
            card3d.classList.remove('flipped');
            isFlipped = false;

            // 완료 오버레이 숨기기
            completeOverlay.classList.remove('active');
        }

        function updateHeartUI() {
            if (hearts[currentIndex]) {
                btnHeart.textContent = '❤️';
                btnHeart.classList.add('liked');
            } else {
                btnHeart.textContent = '🤍';
                btnHeart.classList.remove('liked');
            }
        }

        // ─── 카드 플립 ───
        card3d.addEventListener('click', () => {
            isFlipped = !isFlipped;
            card3d.classList.toggle('flipped', isFlipped);
        });

        // ─── 하트 토글 ───
        btnHeart.addEventListener('click', (e) => {
            e.stopPropagation();
            hearts[currentIndex] = !hearts[currentIndex];
            if (!hearts[currentIndex]) delete hearts[currentIndex];
            saveHearts();
            updateHeartUI();

            // 하트 카운트 업데이트
            const hc = Object.keys(hearts).filter(k => hearts[k]).length;
            heartCount.textContent = `❤️ ${hc}`;
        });

        // ─── 네비게이션 ───
        function navigateTo(newIndex, direction) {
            if (newIndex < 0 || newIndex >= words.length) return;

            const slideOut = direction === 'next' ? 'slide-left' : 'slide-right';
            const slideIn = direction === 'next' ? 'slide-in-left' : 'slide-in-right';

            card3d.classList.add(slideOut);

            setTimeout(() => {
                card3d.classList.remove(slideOut, 'flipped');
                currentIndex = newIndex;
                saveCurrentIndex();
                isFlipped = false;
                renderCard();
                card3d.classList.add(slideIn);

                setTimeout(() => card3d.classList.remove(slideIn), 350);
            }, 300);
        }

        btnPrev.addEventListener('click', () => navigateTo(currentIndex - 1, 'prev'));

        btnNext.addEventListener('click', () => {
            if (currentIndex < words.length - 1) {
                navigateTo(currentIndex + 1, 'next');
            } else {
                // 마지막 카드 → 완료 화면
                showComplete();
            }
        });

        // ─── 스와이프 제스처 ───
        let touchStartX = 0;
        let touchStartY = 0;

        document.getElementById('cardArea').addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        // ─── 홈으로 가기 ───
        function goHome() {
            if (confirm('처음 화면으로 돌아가시겠습니까?\n\n확인: 현재 진행 상황이 초기화되고 홈으로 이동합니다.\n취소: 현재 화면 유지')) {
                clearSavedWords();
                words = [];
                hearts = {};
                localStorage.removeItem('wordcard_hearts');
                showScreen(uploadScreen);
                fileInput.value = '';
            }
        }

        document.getElementById('btnHome').addEventListener('click', goHome);
        document.getElementById('btnListHome').addEventListener('click', goHome);

        document.getElementById('cardArea').addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;

            if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
                if (dx < 0 && currentIndex < words.length - 1) {
                    navigateTo(currentIndex + 1, 'next');
                } else if (dx > 0 && currentIndex > 0) {
                    navigateTo(currentIndex - 1, 'prev');
                } else if (dx < 0 && currentIndex === words.length - 1) {
                    showComplete();
                }
            }
        }, { passive: true });

        // ─── 키보드 ───
        document.addEventListener('keydown', e => {
            if (!cardScreen.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') navigateTo(currentIndex - 1, 'prev');
            else if (e.key === 'ArrowRight') {
                if (currentIndex < words.length - 1) navigateTo(currentIndex + 1, 'next');
                else showComplete();
            }
            else if (e.key === ' ') { e.preventDefault(); card3d.click(); }
        });

        // ─── 완료 화면 ───
        function showComplete() {
            const hc = Object.keys(hearts).filter(k => hearts[k]).length;
            document.getElementById('completeTotal').textContent = words.length;
            document.getElementById('completeHearted').textContent = hc;
            completeOverlay.classList.add('active');
        }

        document.getElementById('btnRestart').addEventListener('click', () => {
            currentIndex = 0;
            completeOverlay.classList.remove('active');
            renderCard();
        });

        // ─── 뒤로가기 (goHome으로 대체됨 - 삭제) ───

        // ─── 리스트 뷰 ───
        document.getElementById('btnListView').addEventListener('click', () => {
            renderList('all');
            showScreen(listScreen);
        });

        document.getElementById('btnListBack').addEventListener('click', () => {
            showScreen(cardScreen);
        });

        // 필터 버튼
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderList(btn.dataset.filter);
            });
        });

        function renderList(filter) {
            const listBody = document.getElementById('listBody');
            listBody.innerHTML = '';

            words.forEach((w, i) => {
                // 필터 적용
                if (filter === 'hearted' && !hearts[i]) return;
                if (filter === 'weak' && w.errors < 3) return;

                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="list-item-left">
                        <div class="list-item-num">${i + 1}</div>
                        <div>
                            <div class="list-item-word">${escapeHtml(w.word)}</div>
                            <div class="list-item-meaning">${escapeHtml(w.meaning)}</div>
                        </div>
                    </div>
                    <span class="list-item-heart ${hearts[i] ? 'liked' : ''}">${hearts[i] ? '❤️' : '🤍'}</span>
                `;

                item.addEventListener('click', () => {
                    currentIndex = i;
                    renderCard();
                    showScreen(cardScreen);
                });

                listBody.appendChild(item);
            });

            if (listBody.children.length === 0) {
                listBody.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px;">해당하는 단어가 없습니다</div>';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ─── 페이지 로드 시 저장된 데이터 복원 ───
        (function initApp() {
            if (loadSavedWords()) {
                requestPersistentStorage();
                loadHearts();
                currentIndex = loadCurrentIndex();
                if (currentIndex >= words.length) currentIndex = 0;
                isFlipped = false;
                renderCard();
                showScreen(cardScreen);
            } else {
                requestPersistentStorage();
            }
        })();
    </script>

</body>

</html>
