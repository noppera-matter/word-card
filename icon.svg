<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#00000040"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#f8717180"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 배경 장식 원 -->
  <circle cx="400" cy="120" r="80" fill="#818cf8" opacity="0.15"/>
  <circle cx="100" cy="400" r="60" fill="#818cf8" opacity="0.1"/>
  <!-- 하트 -->
  <g filter="glow" transform="translate(256, 270) scale(1.05)">
    <path d="M0-80 C-40-130 -120-130 -120-70 C-120-20 -80 20 0 90 C80 20 120-20 120-70 C120-130 40-130 0-80Z" 
          fill="url(#heart)" filter="shadow"/>
    <!-- 하트 하이라이트 -->
    <path d="M-30-75 C-50-100 -90-100 -90-65 C-90-45 -70-30 -30-10" 
          fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  </g>
  <!-- 카드 아이콘 (왼쪽 아래) -->
  <g transform="translate(130, 380)" opacity="0.9">
    <rect x="0" y="0" width="34" height="44" rx="6" fill="white" opacity="0.25"/>
    <rect x="8" y="-6" width="34" height="44" rx="6" fill="white" opacity="0.4"/>
  </g>
</svg>
